<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine - Classificador</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- TensorFlow + Teachable Machine -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

    <style>
        body {
            background: linear-gradient(135deg, #0d6efd, #6c757d);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            border-radius: 20px;
            padding: 20px;
        }

        canvas {
            border-radius: 12px;
            width: 100% !important;
            height: auto !important;
        }

        .progress {
            height: 25px;
            border-radius: 10px;
        }

        .btn-custom {
            font-size: 1.2rem;
            padding: 12px;
            border-radius: 12px;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="card shadow-lg text-dark">
        <div class="text-center mb-3">
            <h2>🤖 Classificador de Imagem</h2>
            <p class="text-muted">Utilizando Teachable Machine</p>
        </div>

        <div class="d-grid mb-4">
            <button class="btn btn-primary btn-custom shadow" onclick="init()">
                🎥 Ativar Câmera
            </button>
        </div>

        <div id="webcam-container" class="text-center mb-4"></div>

        <div id="label-container"></div>
    </div>
</div>

<script>
    const URL = "https://teachablemachine.withgoogle.com/models/cWpp4S_o8P/";

    let model, webcam, labelContainer, maxPredictions;

    async function init() {
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        const flip = true;
        webcam = new tmImage.Webcam(300, 300, flip);
        await webcam.setup();
        await webcam.play();
        window.requestAnimationFrame(loop);

        const webcamContainer = document.getElementById("webcam-container");
        webcamContainer.innerHTML = "";
        webcamContainer.appendChild(webcam.canvas);

        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = "";

        for (let i = 0; i < maxPredictions; i++) {
            const wrapper = document.createElement("div");
            wrapper.classList.add("mb-3");

            const label = document.createElement("div");
            label.classList.add("fw-bold");

            const progress = document.createElement("div");
            progress.classList.add("progress");

            const progressBar = document.createElement("div");
            progressBar.classList.add("progress-bar");
            progressBar.style.width = "0%";
            progressBar.innerText = "0%";

            progress.appendChild(progressBar);
            wrapper.appendChild(label);
            wrapper.appendChild(progress);

            labelContainer.appendChild(wrapper);
        }
    }

    async function loop() {
        webcam.update();
        await predict();
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);

        for (let i = 0; i < maxPredictions; i++) {
            const prob = (prediction[i].probability * 100).toFixed(1);
            const className = prediction[i].className;

            const wrapper = labelContainer.childNodes[i];
            const label = wrapper.childNodes[0];
            const progressBar = wrapper.childNodes[1].childNodes[0];

            label.innerHTML = className + " (" + prob + "%)";
            progressBar.style.width = prob + "%";
            progressBar.innerText = prob + "%";

            if (prob > 70) {
                progressBar.className = "progress-bar bg-success";
            } else if (prob > 40) {
                progressBar.className = "progress-bar bg-warning";
            } else {
                progressBar.className = "progress-bar bg-danger";
            }
        }
    }
</script>

</body>
</html>
